<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              get() { return originalFetch; },
              set(v) { 
                console.warn('An attempt to overwrite window.fetch was detected and safely handled.');
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          // Silently fail if we can't redefine it, as the environment might be locked down
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
